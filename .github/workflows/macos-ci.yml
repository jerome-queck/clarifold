name: macOS CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
