name: Learning experience proposal
description: Suggest a learner-facing improvement to how Clarifold supports understanding and evidence.
title: "[Learning experience]: "
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing a learning-experience proposal. Proposals are reviewed on a best-effort basis; submission does not guarantee a response, acceptance, or implementation, and an accepted issue does not promise a delivery date.

        Do not include private learner material, source documents, Personal Notes, credentials, secrets, or another person's personal data. Do not use this form for security vulnerabilities, conduct reports, privacy questions, commercial licensing, emergencies, or general support. Use the chooser contact links instead.
  - type: textarea
    id: learner-goal
    attributes:
      label: Learner goal
      description: What would an Advanced Mathematics Learner be trying to understand, practise, or make durable evidence of?
    validations:
      required: true
  - type: textarea
    id: current-experience
    attributes:
      label: Current experience
      description: Describe the current workflow and the gap or friction, using synthetic examples rather than learner records.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: What change would help, and what should remain under learner control?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact and evidence
      description: Explain who benefits, how you would recognize improvement, and any accessibility, privacy, provenance, or verification considerations.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workaround or existing Clarifold capability did you try? Do not include private or unnecessary personal data.
    validations:
      required: false
  - type: checkboxes
    id: safe-to-publish
    attributes:
      label: Public issue confirmation
      options:
        - label: I confirm that this proposal contains no private learner material, secrets, credentials, or another person's personal data, and that it is safe to publish publicly.
          required: true
