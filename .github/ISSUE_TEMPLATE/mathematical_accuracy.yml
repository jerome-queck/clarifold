name: Mathematical-accuracy concern
description: Flag a mathematical statement, explanation, source claim, or verification presentation that may be inaccurate or misleading.
title: "[Mathematical accuracy]: "
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping protect mathematical trust. A concern is reviewed on a best-effort basis; submission does not guarantee a response, acceptance, or implementation. Formal verification claims must be tied to the exact statement and assumptions checked by the recorded Verifier Environment.

        Do not include private learner material, source documents, Personal Notes, credentials, secrets, or another person's personal data. Do not use this form for security vulnerabilities, conduct reports, privacy questions, commercial licensing, emergencies, or general support. Use the chooser contact links instead.
  - type: input
    id: claim-location
    attributes:
      label: Claim location
      description: Where did you see the statement (screen, artifact, documentation, or public source), and which version or commit was involved?
    validations:
      required: true
  - type: textarea
    id: claim
    attributes:
      label: Exact claim or explanation
      description: Quote only the smallest public or synthetic excerpt needed to identify the concern. Do not paste private learner content.
    validations:
      required: true
  - type: textarea
    id: concern
    attributes:
      label: What may be inaccurate or misleading?
      description: Explain the suspected error, missing assumption, unsupported inference, or presentation problem.
    validations:
      required: true
  - type: textarea
    id: reasoning
    attributes:
      label: Reasoning or counterexample
      description: Provide a concise derivation, counterexample, or publicly shareable reference that supports the concern.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Describe the safe inputs and actions that reproduce the concern. Use synthetic mathematics and remove private source material.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact and urgency
      description: Who could be misled, what understanding or evidence could be affected, and is there a safe workaround?
    validations:
      required: true
  - type: checkboxes
    id: safe-to-publish
    attributes:
      label: Public issue confirmation
      options:
        - label: I confirm that this report contains no private learner material, secrets, credentials, or another person's personal data, and that it is safe to publish publicly.
          required: true
